name: APIRequestwithSecret

on: [push]

jobs:
  api_call:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make API request
        env:
          API_KEY: ${{ secrets.MY_SECRET_KEY }}
        run: |
          curl -H "Authorization: Bearer $API_KEY" https://api.example.com/data
